# Reference only — the running container uses config/config.template.yml rendered by
# scripts/docker-entrypoint.sh from environment variables (see .env.example).

name: nebula_strike

logger:
  level: "INFO"

server:
  # Used for some server-side checks; HTTP/WebSocket clients use socket.server_key
  key: "nebula-strike-dev-key"

socket:
  # Must match the frontend VITE_NAKAMA_SERVER_KEY / Nakama JS Client key
  server_key: "nebula-strike-dev-key"
  outgoing_queue_size: 64

console:
  username: "admin"
  password: "password"
