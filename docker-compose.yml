services:
  postgres:
    image: postgres:15-alpine
    container_name: nebula_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nakama
    ports:
      # Host 5433 avoids clashing with a local Postgres on 5432; use `docker compose exec postgres psql` if preferred
      - "5433:5432"
    volumes:
      - nebula_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  nakama:
    container_name: nebula_nakama
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Local Postgres (see postgres service above). Production: use docker-compose.prod.yml + Neon.
      DATABASE_ADDRESS: ${DATABASE_ADDRESS:-postgres:password@postgres:5432/nakama?sslmode=disable}
      NAKAMA_SERVER_KEY: ${NAKAMA_SERVER_KEY:-nebula-strike-dev-key}
      NAKAMA_CONSOLE_USERNAME: ${NAKAMA_CONSOLE_USERNAME:-admin}
      NAKAMA_CONSOLE_PASSWORD: ${NAKAMA_CONSOLE_PASSWORD:-password}
    ports:
      - "7349:7349" # gRPC
      - "7350:7350" # HTTP + WebSocket (client)
      - "7351:7351" # Console
    restart: unless-stopped

volumes:
  nebula_pgdata:
