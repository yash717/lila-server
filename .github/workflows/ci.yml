name: Server CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ The following files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi
          echo "✅ All files are properly formatted"
        continue-on-error: true

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          args: --timeout=3m

      - name: Build plugin
        run: go build -buildmode=plugin -trimpath -o nebula_server.so

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

  deploy:
    name: Deploy to EC2
    needs: lint-and-build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Pulling latest code ==="
            cd ~/lila-server
            git fetch origin main
            git reset --hard origin/main
            
            # Use docker to query the running container for its image, so we can rollback if needed
            PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' nebula_nakama_prod 2>/dev/null || echo "ghcr.io/yash717/lila-server:latest")
            # Extract just the tag
            PREV_TAG=${PREV_IMAGE##*:}

            export IMAGE_TAG=${{ github.sha }}

            echo "=== Pulling Image ($IMAGE_TAG) ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Deploying ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Health Check (60s wait) ==="
            RETRY=0
            HEALTHY=false
            while [ $RETRY -lt 15 ]; do
              if curl -sf http://127.0.0.1:7350/healthcheck > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              echo "Waiting... ($RETRY/15)"
              sleep 4
              RETRY=$((RETRY+1))
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Nakama is healthy! Deploy successful."
            else
              echo "❌ Nakama failed health check! Triggering ROLLBACK."
              docker compose -f docker-compose.prod.yml logs --tail=50 nakama
              
              echo "=== Rolling Back to $PREV_TAG ==="
              export IMAGE_TAG=$PREV_TAG
              docker compose -f docker-compose.prod.yml up -d
              
              echo "✅ Rollback applied. Exiting with failure."
              exit 1
            fi
