name: Server Deploy

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # Only deploy if CI passes (same commit)
    needs: []

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            echo "=== Logging into GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== Pulling latest code ==="
            cd ~/lila-server
            git fetch origin main
            git reset --hard origin/main
            
            # Use docker to query the running container for its image, so we can rollback if needed
            PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' nebula_nakama_prod 2>/dev/null || echo "ghcr.io/yash717/lila-server:latest")
            # Extract just the tag
            PREV_TAG=${PREV_IMAGE##*:}

            export IMAGE_TAG=${{ github.sha }}

            echo "=== Pulling Image ($IMAGE_TAG) ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Deploying ==="
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Health Check (60s wait) ==="
            RETRY=0
            HEALTHY=false
            while [ $RETRY -lt 15 ]; do
              if curl -sf http://127.0.0.1:7350/healthcheck > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              echo "Waiting... ($RETRY/15)"
              sleep 4
              RETRY=$((RETRY+1))
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Nakama is healthy! Deploy successful."
            else
              echo "❌ Nakama failed health check! Triggering ROLLBACK."
              docker compose -f docker-compose.prod.yml logs --tail=50 nakama
              
              echo "=== Rolling Back to $PREV_TAG ==="
              export IMAGE_TAG=$PREV_TAG
              docker compose -f docker-compose.prod.yml up -d
              
              echo "✅ Rollback applied. Exiting with failure."
              exit 1
            fi
