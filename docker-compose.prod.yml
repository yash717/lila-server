# Prod: copy .env.example to .env, set DATABASE_ADDRESS (Nakama form), keys, console password.
# Run: docker compose -f docker-compose.prod.yml up -d --build

services:
  nakama:
    container_name: nebula_nakama_prod
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped
